<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Dice Roller</title>
  </head>
  <body>
    <main class="app">
      <section class="hero-card">
        <div class="hero-top">
          <p class="tag">Interactive Mini App</p>
          <h1>Dice Roller <span>PRO Version</span></h1>
          <p class="description">
            Roll a virtual dice, reveal a random value from 1 to 6, and keep
            track of your latest results in a clean history panel.
          </p>
        </div>

        <div class="dice-panel">
          <div class="dice-visual-wrap">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>

            <div class="dice-box" id="diceBox">
              <div class="dice-emoji" id="diceEmoji">🎲</div>
            </div>
          </div>

          <div class="result-box">
            <p class="result-label">Current Result</p>
            <h2 class="result-number" id="diceNumber">-</h2>
            <p class="result-hint">Press the button to roll the dice</p>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="rollBtn">Roll Dice</button>
          <button class="btn btn-secondary" id="clearBtn">Clear History</button>
        </div>
      </section>

      <section class="history-card">
        <div class="history-header">
          <div>
            <p class="history-mini">Recent Activity</p>
            <h3>Roll History</h3>
          </div>
          <div class="history-counter" id="historyCount">0 rolls</div>
        </div>

        <ul class="history-list" id="historyList">
          <li class="empty-state">
            <span class="empty-icon"></span>
            <div>
              <p class="empty-title"></p>
              <p class="empty-text"></p>
            </div>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
